name: Tests

on:
  push:

jobs:
  rspec:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: rubygems/configure-rubygems-credentials@main
        with:
          role-to-assume: 2
          gem-server: 'https://oidc-api-token.rubygems.org'
          audience: 'https://oidc-api-token.rubygems.org'

      - uses: actions/checkout@v3
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - run: bundle exec rspec

      - name: Setup RubyGems credentials
        if: success() && github.ref == 'refs/heads/master'
        uses: rubygems/configure-rubygems-credentials@v1
        with:
          role-to-assume: rg_oidc_akr_xr1vjgsetqn4d7oqdxff

      - name: Publish to RubyGems
        if: success() && github.ref == 'refs/heads/master'
        run: |
          gem build *.gemspec
          gem push *.gem
